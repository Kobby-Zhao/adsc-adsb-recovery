# ============================================================
# A2: A1 + Step2: DMS 时序注意力修正 (精简 sparse features, 无 risk gate)
# 目标: 测量 DMS refiner 的增量 (gap几何特征归 A3, DMS只吃锚点+隐状态)
# 对比: A2 vs A1 → DMS 序列精炼价值
# ============================================================

base_config: ../train_v1_control_e5_20260321.yaml
data:
  samples_path: outputs/mvp_merged_250_20260514_clean/stage3_clean/samples.parquet
  split:
    train_ratio: 0.8
    val_ratio: 0.1
    test_ratio: 0.1
  quality_cols: []
  exo_cols:
  - is_anchor
  - dt_prev
  - dt_next
  - gap_len
  - gap_pos_ratio
  - vertical_speed
  - speed_delta
  - turn_rate
  vertical_exo_cols:
  - is_anchor
  - dt_prev
  - dt_next
  - gap_len
  - gap_pos_ratio
  - vertical_speed
  - speed_delta
  - turn_rate
  segment_risk_rules_path: configs/segment_risk_rules.yaml
model:
  backbone_type: bilstm
  model_variant: bilstm_alt_dms_refiner_v2_1  # DMS refiner
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  dms_refiner_hidden_size: 64
  dms_refiner_latent_dim: 32
  dms_refiner_num_heads: 2
  dms_refiner_ff_multiplier: 2
  dms_refiner_dropout: 0.1
  alt_gate_enabled: false                     # 无 risk gate
  alt_main_mode: anchor_relative
  main_rmax_ft: 500.0
  alt_bias_enabled: false                     # 关闭 A3 辅助头
  vertical_projector_enabled: false           # 关闭 A3 辅助头
  fusion_position_prior_enabled: true
training:
  epochs: 24
  checkpoint_monitor_metric: gap_alt_rmse
  save_every_epoch: true
  save_epoch_interval: 1
  device: cuda
  risk_aware:
    use_segment_teacher: false
    use_alt_baseline_residual: true           # DMS 需要 alt_base 特征
  curriculum:
    enabled: true
    val_stage: stage3
    train_samples_per_epoch: 800
    stage_paths:
      stage1: outputs/mvp_merged_250_20260514_clean/stage1_clean/samples.parquet
      stage2: outputs/mvp_merged_250_20260514_clean/stage2_clean/samples.parquet
      stage3: outputs/mvp_merged_250_20260514_clean/stage3_clean/samples.parquet
    schedule:
    - end_epoch: 6
      weights:
        stage1: 0.7
        stage2: 0.25
        stage3: 0.05
    - end_epoch: 12
      weights:
        stage1: 0.2
        stage2: 0.6
        stage3: 0.2
    - end_epoch: 18
      weights:
        stage1: 0.15
        stage2: 0.35
        stage3: 0.6
    - end_epoch: 24
      weights:
        stage1: 0.05
        stage2: 0.2
        stage3: 0.75
  anchor_gate:
    strict: false
  batch_size: 32
  step_heartbeat:
    enabled: true
    interval: 5
loss:
  lambda_alt_aux: 10.0
  lambda_unc: 0.0
  fusion_reg_lambda: 0.0
  lambda_vertical_smooth: 0.02       # DMS 残差平滑
  lambda_multi_scale: 0.0
  lambda_cruise_phys: 0.0
  lambda_alt_gate_supervision: 0.0   # 无门控
  lambda_alt_gate_risk_shrink: 0.0
  lambda_alt_edge_first_diff: 0.05   # 边界连续性
  lambda_alt_edge_second_diff: 0.03
  lambda_alt_segment_bound: 0.04
outputs:
  run_dir: outputs/experiments/ablation_submodules/ablation_a2_step2_24e
