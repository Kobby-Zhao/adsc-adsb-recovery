# ============================================================
# A3: 主趋势 + DMS残差细化 (无风险门控)
# 目标: 测量DMS残差细化的增量贡献, 并在无门控条件下观察残差行为
# 对比: A3 vs A2 → DMS残差细化是否必要
#       A3 vs A4 → 风险门控有无额外收益
# ============================================================

base_config: ../train_v1_control_e5_20260321.yaml
data:
  samples_path: outputs/mvp_merged_250_20260514_clean/stage3_clean/samples.parquet
  split:
    train_ratio: 0.8
    val_ratio: 0.1
    test_ratio: 0.1
  quality_cols: []
  exo_cols:
  - is_anchor
  - dt_prev
  - dt_next
  - gap_len
  - gap_pos_ratio
  - vertical_speed
  - speed_delta
  - turn_rate
  vertical_exo_cols:
  - is_anchor
  - dt_prev
  - dt_next
  - gap_len
  - gap_pos_ratio
  - vertical_speed
  - speed_delta
  - turn_rate
  segment_risk_rules_path: configs/segment_risk_rules.yaml
model:
  backbone_type: bilstm
  model_variant: bilstm_alt_dms_refiner_v2_1  # 启用 DMS refiner
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  dms_refiner_hidden_size: 64
  dms_refiner_latent_dim: 32
  dms_refiner_num_heads: 2
  dms_refiner_ff_multiplier: 2
  dms_refiner_dropout: 0.1
  alt_gate_enabled: false                     # 关闭风险门控 (与A4的唯一差异)
  alt_main_mode: anchor_relative
  main_rmax_m: 152.4
  main_rmax_min_m: 91.44
  main_rmax_slope_m_per_min: 4.572
  main_rmax_max_m: 365.76
training:
  epochs: 24
  checkpoint_monitor_metric: gap_alt_rmse
  save_every_epoch: true
  save_epoch_interval: 1
  risk_aware:
    use_segment_teacher: false                # 关闭, 无风险教师信号
    use_alt_baseline_residual: true           # DMS refiner 需要使用 alt_base 特征
  curriculum:
    enabled: true
    val_stage: stage3
    train_samples_per_epoch: 800
    stage_paths:
      stage1: outputs/mvp_merged_250_20260514_clean/stage1_clean/samples.parquet
      stage2: outputs/mvp_merged_250_20260514_clean/stage2_clean/samples.parquet
      stage3: outputs/mvp_merged_250_20260514_clean/stage3_clean/samples.parquet
    schedule:
    - end_epoch: 6
      weights:
        stage1: 0.7
        stage2: 0.25
        stage3: 0.05
    - end_epoch: 12
      weights:
        stage1: 0.2
        stage2: 0.6
        stage3: 0.2
    - end_epoch: 18
      weights:
        stage1: 0.15
        stage2: 0.35
        stage3: 0.6
    - end_epoch: 24
      weights:
        stage1: 0.05
        stage2: 0.2
        stage3: 0.75
  anchor_gate:
    strict: false
  batch_size: 32
  step_heartbeat:
    enabled: true
    interval: 5
loss:
  lambda_unc: 0.0
  fusion_reg_lambda: 0.0
  lambda_vertical_smooth: 0.02       # 保留垂直平滑损失
  lambda_multi_scale: 0.0
  lambda_cruise_phys: 0.0
  lambda_alt_gate_supervision: 0.0   # 无门控, 关闭门控相关损失
  lambda_alt_gate_risk_shrink: 0.0
  lambda_alt_edge_first_diff: 0.05   # 保留边界连续性约束
  lambda_alt_edge_second_diff: 0.03
  lambda_alt_segment_bound: 0.04
outputs:
  run_dir: outputs/experiments/ablation_submodules/ablation_a3_nogate_residual_24e
