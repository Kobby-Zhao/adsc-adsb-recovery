base_config: ../train_v1_control_e5_20260321.yaml

data:
  samples_path: outputs/mvp_adsb3864_20260322/samples.parquet
  split:
    train_ratio: 0.8
    val_ratio: 0.1
    test_ratio: 0.1
  quality_cols: []
  segment_risk_rules_path: configs/segment_risk_rules.yaml

model:
  backbone_type: bilstm
  model_variant: bilstm_alt_dms_refiner_v2_1
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  dms_refiner_hidden_size: 64
  dms_refiner_latent_dim: 32
  dms_refiner_num_heads: 2
  dms_refiner_ff_multiplier: 2
  dms_refiner_dropout: 0.1
  alt_gate_enabled: true
  alt_gate_hidden_size: 32
  alt_gate_mode: teacher_fixed
  alt_gate_fixed_value: 0.6
  alt_main_mode: anchor_relative
  main_rmax_ft: 500.0

training:
  epochs: 3
  checkpoint_monitor_metric: gap_alt_rmse
  save_every_epoch: true
  save_epoch_interval: 1
  risk_aware:
    use_segment_teacher: true
    use_alt_baseline_residual: true

loss:
  lambda_unc: 0.0
  fusion_reg_lambda: 0.0
  lambda_vertical_smooth: 0.02
  lambda_multi_scale: 0.0
  lambda_cruise_phys: 0.0
  # risk-aware training losses
  lambda_alt_gate_supervision: 0.10
  lambda_alt_gate_risk_shrink: 0.08
  alt_gate_risk_target: 0.35
  lambda_alt_edge_first_diff: 0.05
  lambda_alt_edge_second_diff: 0.03
  lambda_alt_segment_bound: 0.04
  alt_edge_steps: 2
  alt_edge_weight: 2.0

  # Exp-10: local spike-aware loss on medium + two_anchor at right_step2
  use_local_spike_loss: true
  local_spike_target_bucket: medium
  local_spike_target_pattern: two_anchor
  local_spike_use_rightstep2: true
  local_spike_use_second_diff: true
  local_spike_lambda_jump: 1.0
  local_spike_lambda_curve: 1.0

outputs:
  run_dir: outputs/experiments/exp10_local_spike_loss_20260410

