base_config: ../train_v1_control_e5_20260321.yaml

data:
  samples_path: outputs/mvp_adsb3864_20260322/samples.parquet
  split:
    train_ratio: 0.8
    val_ratio: 0.1
    test_ratio: 0.1
  quality_cols: []

model:
  backbone_type: bilstm
  model_variant: bilstm_alt_dms_refiner_v2
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  transformer_num_heads: 4
  transformer_ff_multiplier: 4
  alt_bias_enabled: false
  fusion_use_exo_quality: false
  vertical_projector_enabled: false
  vertical_tune_enabled: false
  dms_refiner_hidden_size: 64
  dms_refiner_latent_dim: 32
  dms_refiner_num_heads: 2
  dms_refiner_ff_multiplier: 2
  dms_refiner_dropout: 0.1

training:
  epochs: 10
  checkpoint_monitor_metric: gap_alt_rmse
  save_every_epoch: true
  save_epoch_interval: 1
  alt_target_robust:
    mode: none
    clip_value: 3000.0
  alt_label_governance:
    enabled: true
    mode: drop_sample_by_max_abs_altrel
    train_gap_abs_altrel_quantile: 0.995
    outlier_csv: outputs/runs/alt_input_label_audit_20260321/label_top_outliers.csv
    outlier_split: train
    outlier_scope: sample_and_flight
  segment_augmentation:
    enabled: false

loss:
  lambda_unc: 0.0
  fusion_reg_lambda: 0.0
  lambda_vertical_smooth: 0.02
  lambda_multi_scale: 0.0
  lambda_cruise_phys: 0.0

inference:
  segment_policy:
    enabled: true
    stable_std_threshold: 100.0
    boundary_short_minutes: 15
    policy_table:
      - segment_type: Boundary
        length_bucket: <=15
        residual_mode: off
        output_weight: 0.0
      - segment_type: Boundary
        length_bucket: 15-60
        residual_mode: scale
        residual_scale: 0.25
        edge_mode: clip_damp
        edge_steps: 2
        edge_damp: 0.2
        clip_value: 100.0
        output_weight: 0.35
      - segment_type: Boundary
        length_bucket: ">60"
        residual_mode: scale
        residual_scale: 0.35
        edge_mode: clip_damp
        edge_steps: 2
        edge_damp: 0.2
        clip_value: 140.0
        output_weight: 0.45
      - segment_type: Disturbed
        length_bucket: <=15
        residual_mode: off
        output_weight: 0.0
      - segment_type: Disturbed
        length_bucket: 15-60
        residual_mode: scale
        residual_scale: 0.40
        edge_mode: clip_damp
        edge_steps: 2
        edge_damp: 0.25
        clip_value: 150.0
        output_weight: 0.55
      - segment_type: Disturbed
        length_bucket: ">60"
        residual_mode: scale
        residual_scale: 0.55
        edge_mode: soft_damp
        edge_steps: 2
        edge_damp: 0.35
        clip_value: 200.0
        output_weight: 0.70
      - segment_type: Stable
        length_bucket: <=15
        residual_mode: scale
        residual_scale: 0.60
        edge_mode: soft_damp
        edge_steps: 1
        edge_damp: 0.6
        clip_value: 220.0
        output_weight: 0.80
      - segment_type: Stable
        length_bucket: 15-60
        residual_mode: scale
        residual_scale: 0.85
        edge_mode: none
        output_weight: 0.95
      - segment_type: Stable
        length_bucket: ">60"
        residual_mode: scale
        residual_scale: 1.0
        edge_mode: none
        output_weight: 1.0

outputs:
  run_dir: outputs/runs/fair_train_adsb3864_bilstm_alt_dms_refiner_v2_no_aug_e10_20260407
