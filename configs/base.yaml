seed: 42

data:
  samples_path: outputs/mvp/samples.parquet
  split:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
  sample_id_col: sample_id
  flight_id_col: flight_id
  time_col: minute_ts
  target_cols: [lat, lon, alt]
  obs_cols: [obs_lat, obs_lon, obs_alt]
  obs_mask_col: obs_mask
  exo_cols:
    [
      is_anchor,
      dt_prev,
      dt_next,
      gap_len,
      gap_pos_ratio,
      vertical_speed,
      speed_delta,
      turn_rate,
      heading_delta,
      local_speed_std,
      local_heading_std,
      local_alt_std,
      num_points_in_minute,
    ]
  quality_cols: [tag13_exists, tag14_exists, tag15_exists, tag16_exists, position_accuracy, jump_flag, smooth_residual_proxy]

model:
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  coord_mode: latlon # latlon | enu
  u_relative_anchor: false # only effective when coord_mode=enu
  en_relative_anchor: true # only effective when u_relative_anchor=true
  en_incremental: false # only effective when u_relative_anchor=true
  fusion_hidden_size: 32
  fusion_use_exo_quality: false

loss:
  type: smooth_l1
  anchor_weight: 1.0
  gap_weight: 2.0
  dim_weights: [1.0, 1.0, 1.0] # optional; if omitted, defaults to [1,1,1]
  alpha_vertical: 1.0
  lambda_pos: 1.0
  lambda_smooth: 0.1
  lambda_unc: 0.0
  lambda_cruise_phys: 0.0
  cruise_speed_smooth_weight: 1.0
  cruise_heading_rate_weight: 0.5
  cruise_vertical_rate_weight: 1.0
  cruise_planar_accel_weight: 0.5
  cruise_max_abs_vertical_rate: 300.0
  cruise_max_speed_delta: 30.0
  cruise_max_heading_rate: 5.0
  cruise_quality_weight_gain: 1.0
  lambda_multi_scale: 0.0
  multi_scale_scales: [5, 10, 20]
  multi_scale_include_alt: false
  fusion_reg_lambda: 0.0
  fusion_reg_long_gap_weight: 1.0
  lambda_vertical_smooth: 0.0

training:
  epochs: 20
  batch_size: 8
  lr: 0.001
  weight_decay: 0.0001
  teacher_forcing_ratio: 0.8
  teacher_forcing_decay: 0.95
  grad_clip: 1.0
  num_workers: 0
  device: cpu
  long_gap_threshold: 20
  checkpoint_monitor_metric: gap_horizontal_rmse_m
  target_norm:
    enabled: false
  early_stopping:
    enabled: false
    patience: 8
    min_delta: 100.0
    min_epochs: 12

outputs:
  run_dir: outputs/runs/default
  checkpoint_name: best.pt

inference:
  split: test
  output_csv: outputs/infer/predictions.csv
