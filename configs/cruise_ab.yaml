base_train_config: configs/train_enu_999.yaml

prepare:
  adsb_raw_dir: outputs/points/raw/train_fetch_resume
  adsc_decoded: ads-c_data/adsc_decoded.txt
  target_unique_flights: 999
  window_size: 120
  stride: 30
  num_augment_per_flight: 3
  min_gap_minutes: 3
  max_gap_minutes: 60
  max_abs_vertical_rate: 300.0
  max_speed_delta: 30.0
  max_heading_rate: 5.0
  min_cruise_minutes_options: [30, 20]

training:
  short_epochs: 1
  long_gap_threshold: 20

outputs:
  root_dir: outputs/ab_cruise
