seed: 42
data:
  samples_path: outputs/mvp_audit_stage1_fixgap/samples.parquet
  split:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
  sample_id_col: sample_id
  flight_id_col: flight_id
  time_col: minute_ts
  target_cols: [lat, lon, alt]
  obs_cols: [obs_lat, obs_lon, obs_alt]
  obs_mask_col: obs_mask
  exo_cols: [is_anchor, dt_prev, dt_next, gap_len, gap_pos_ratio, vertical_speed, speed_delta, turn_rate]
  quality_cols: []
model:
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  coord_mode: enu
  u_relative_anchor: true
  en_relative_anchor: true
  en_incremental: true
loss:
  type: smooth_l1
  anchor_weight: 1.0
  gap_weight: 2.0
  dim_weights: [1.0, 1.0, 1.0]
  alpha_vertical: 1.0
  lambda_pos: 1.0
  lambda_smooth: 0.1
  lambda_unc: 0.0
training:
  epochs: 16
  batch_size: 16
  lr: 0.001
  weight_decay: 0.0001
  teacher_forcing_ratio: 0.8
  teacher_forcing_decay: 0.95
  grad_clip: 1.0
  num_workers: 0
  device: cpu
  long_gap_threshold: 20
  checkpoint_monitor_metric: gap_rmse
  target_norm:
    enabled: false
  curriculum:
    enabled: true
    val_stage: stage3
    train_samples_per_epoch: 170
    stage_paths:
      stage1: outputs/mvp_audit_stage1_fixgap/samples.parquet
      stage2: outputs/mvp_audit_stage2_fixgap/samples.parquet
      stage3: outputs/mvp_audit_stage3_fixgap/samples.parquet
    schedule:
      - end_epoch: 4
        weights: {stage1: 1.0, stage2: 0.0, stage3: 0.0}
      - end_epoch: 10
        weights: {stage1: 0.5, stage2: 0.5, stage3: 0.0}
      - end_epoch: 16
        weights: {stage1: 0.2, stage2: 0.6, stage3: 0.2}
outputs:
  run_dir: outputs/runs/train_audit_curriculum_fixgap_e16_refine
  checkpoint_name: best.pt
inference:
  split: test
  output_csv: outputs/infer/predictions.csv
